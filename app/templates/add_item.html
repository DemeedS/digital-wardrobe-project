{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4">Add Item</h2>
        <form method="POST">
            <div class="mb-3">
                <label>Type</label>
                <select name="type" class="form-control" required>
                    <option value="">Select type</option>
                    <option>Shirt</option>
                    <option>Pants</option>
                    <option>Socks</option>
                    <option>Hat</option>
                    <option>Shoes</option>
                    <option>Jacket</option>
                    <option>Dress</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Color</label>
                <input type="text" name="color" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Size</label>
                <select name="size" class="form-control" required>
                    <option value="">Select size</option>
                    <option>XS</option>
                    <option>S</option>
                    <option>M</option>
                    <option>L</option>
                    <option>XL</option>
                    <option>XXL</option>
                </select>
            </div>
            <div class="mb-3">
                <label>Material</label>
                <input type="text" name="material" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Brand</label>
                <input type="text" name="brand" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>Season</label>
                <select name="season" class="form-control" required>
                    <option value="">Select season</option>
                    <option>Spring</option>
                    <option>Summer</option>
                    <option>Fall</option>
                    <option>Winter</option>
                </select>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" name="favorite" class="form-check-input" id="favorite">
                <label class="form-check-label" for="favorite">Mark as Favorite</label>
            </div>
            <button type="submit" class="btn btn-dark w-100">Add Item</button>
        </form>
    </div>
</div>
{% endblock %}
